<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { margin:0; font-family:Arial; background:#f4f6f9; }
        .sidebar {
            width:200px; height:100vh; background:#343a40;
            position:fixed; color:white; padding-top:20px;
        }
        .sidebar a {
            display:block; color:white; padding:10px;
            text-decoration:none;
        }
        .sidebar a:hover { background:#495057; }

        .content {
            margin-left:200px; padding:20px;
        }
        .card {
            display:inline-block;
            width:200px; padding:20px;
            margin:10px;
            background:white;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }
        .topbar {
            background:white; padding:15px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="text-align:center;">ERP Panel</h3>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Products</a>
    <a href="#">Customers</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">
    <div class="topbar">
        <h2>Welcome Admin 👋</h2>
    </div>

    <div class="card">
        <h3>Total Sales</h3>
        <p>₹50,000</p>
    </div>

    <div class="card">
        <h3>Total Orders</h3>
        <p>120</p>
    </div>

    <div class="card">
        <h3>Total Customers</h3>
        <p>75</p>
    </div>
</div>

</body>
</html>
