<!DOCTYPE html>
<html>
<head>
    <title>Manya Fashion ERP</title>
</head>
<body>

<h1>Manya Fashion ERP 🚀</h1>

<h2>Add Product</h2>

<form method="POST" action="/add">
    Code: <input type="text" name="code" required><br><br>
    Name: <input type="text" name="name" required><br><br>
    Cost Price: <input type="number" step="0.01" name="cost_price" required><br><br>
    Sell Price: <input type="number" step="0.01" name="sell_price" required><br><br>
    Quantity: <input type="number" name="quantity" required><br><br>
    <button type="submit">Add Product</button>
</
