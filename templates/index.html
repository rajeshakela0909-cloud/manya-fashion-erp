<!DOCTYPE html>
<html>
<head>
    <title>Manya Fashion ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Manya Fashion ERP</h2>

    <!-- ADD PRODUCT -->
    <div class="card p-3 mb-4">
        <h4>Add Product</h4>
        <form method="POST" action="/add_product">
            <div class="row">
                <div class="col"><input name="code" class="form-control" placeholder="Code" required></div>
                <div class="col"><input name="name" class="form-control" placeholder="Name" required></div>
                <div class="col"><input name="cost_price" type="number" step="0.01" class="form-control" placeholder="Cost" required></div>
                <div class="col"><input name="sell_price" type="number" step="0.01" class="form-control" placeholder="Sell" required></div>
                <div class="col"><input name="quantity" type="number" class="form-control" placeholder="Qty" required></div>
            </div>
            <button class="btn btn-primary mt-3">Add Product</button>
        </form>
    </div>

    <!-- PRODUCT LIST -->
    <div class="card p-3">
        <h4>Product List</h4>
        <table class="table table-bordered">
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Stock</th>
                <th>Cost</th>
                <th>Sell</th>
            </tr>
            {% for p in products %}
            <tr>
                <td>{{ p.code }}</td>
                <td>{{ p.name }}</td>
                <td>{{ p.quantity }}</td>
                <td>{{ p.cost_price }}</td>
                <td>{{ p.sell_price }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
