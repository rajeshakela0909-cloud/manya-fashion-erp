<!DOCTYPE html>
<html>
<head>
    <title>Manya Fashion ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Manya Fashion ERP 🚀</h1>
        <p class="text-muted">Inventory Management System</p>
    </div>

    <!-- Add Product Card -->
    <div class="card shadow p-4 mb-5">
        <h4 class="mb-3">Add Product</h4>
        <form method="POST" action="/add">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Code</label>
                    <input name="code" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Name</label>
                    <input name="name" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cost Price</label>
                    <input name="cost_price" type="number" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Sell Price</label>
                    <input name="sell_price" type="number" step="0.01" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Quantity</label>
                    <input name="quantity" type="number" class="form-control" required>
                </div>
            </div>
            <button class="btn btn-primary">Add Product</button>
        </form>
    </div>

    <!-- Product List -->
    <div class="card shadow p-4">
        <h4 class="mb-3">Product List</h4>
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Cost</th>
                        <th>Sell</th>
                        <th>Qty</th>
                        <th>Profit</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in products %}
                    <tr>
                        <td>{{ p.code }}</td>
                        <td>{{ p.name }}</td>
                        <td>{{ p.cost_price }}</td>
                        <td>{{ p.sell_price }}</td>
                        <td>{{ p.quantity }}</td>
                        <td class="text-success fw-bold">
                            {{ (p.sell_price - p.cost_price) * p.quantity }}
                        </td>
                        <td>
                            <a href="/delete/{{p.id}}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
